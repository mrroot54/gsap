<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Style Pinned Section</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: white; overflow-x: hidden; }
        
        section { height: 100vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #333; font-size: 2rem; }

        /* --- THE PINNED CONTAINER --- */
        .pinned-section {
            height: 100vh;
            overflow: hidden; /* Bahar wala content na dikhe */
            position: relative;
            background: #222;
            display: flex;
            align-items: center;
        }

        /* --- INNER MOVING WRAPPER --- */
        .move-wrapper {
            display: flex;
            gap: 50px;
            padding-left: 10vw; /* Shuru mein right side se */
        }

        .box {
            width: 300px;
            height: 200px;
            background: #3b82f6;
            border-radius: 12px;
            flex-shrink: 0; /* Boxes shrink na hon */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .box:nth-child(even) { background: #8b5cf6; }

    </style>
</head>
<body>

    <!-- Normal Section 1 -->
    <section>Section 1 (Normal Scroll)</section>

    <!-- THE SPECIAL SECTION (Like GSAP Demos) -->
    <div class="pinned-section">
        <!-- Is wrapper ko hum Left se Right move karenge -->
        <div class="move-wrapper">
            <div class="box">Feature 01</div>
            <div class="box">Feature 02</div>
            <div class="box">Feature 03</div>
            <div class="box">Feature 04</div>
            <div class="box">Feature 05</div>
        </div>
    </div>

    <!-- Normal Section 3 -->
    <section>Section 3 (Scroll Continues)</section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Wrapper select karo
        const wrapper = document.querySelector(".move-wrapper");
        
        // 2. GSAP animation lagao
        gsap.to(wrapper, {
            // Logic: Wrapper ko Left side shift karo
            // Total width - Window width calculate kar ke utna shift karenge
            x: () => -(wrapper.scrollWidth - window.innerWidth),
            
            ease: "none", // Linear movement
            
            scrollTrigger: {
                trigger: ".pinned-section", // Kaunsa section pin karna hai
                pin: true,    // <--- YE SABSE IMPORTANT LINE HAI
                scrub: 1,     // Smooth scrub
                end: "+=2000" // Scroll kitna lamba chalega
            }
        });
    </script>

</body>
</html>
